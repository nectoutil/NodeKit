name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    # Skip on metadata-only automated PRs. `test` has `needs: build` so it
    # cascades. Push-to-main is unaffected (main always gets verified).
    # - changeset-release/main: version bumps + CHANGELOG, already tested in
    #   the feature PRs that produced each changeset.
    # - chore/license-headers: top-of-file comment blocks only, cannot affect
    #   runtime behavior.
    if: |
      github.event_name != 'pull_request' ||
      (github.head_ref != 'changeset-release/main' && github.head_ref != 'chore/license-headers')
    uses: ./.github/workflows/build.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test:
    name: Run tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run tests
        run: pnpm vitest run --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Run tests with coverage
        run: pnpm test:coverage

      # lcov files emit `SF:src/foo.ts` relative to each package. Codecov
      # needs repo-root-relative paths to match files, so prepend each
      # package directory. Done here (not in codecov.yml) so the artifact
      # we upload is "ready to consume" by any downstream uploader.
      - name: Fix lcov paths
        run: |
          find packages -name lcov.info -path "*/coverage/*" | while IFS= read -r f; do
            pkg=$(dirname "$(dirname "$f")")/
            sed -i "s|^SF:|SF:${pkg}|g" "$f"
          done

      # Hand off to codecov.yml via artifacts. The Codecov workflow is
      # triggered by `workflow_run` on this workflow's completion.
      - name: Upload test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v8
        with:
          name: test-results
          path: test-report.junit.xml
          if-no-files-found: error
          retention-days: 1

      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v8
        with:
          name: coverage-lcov
          path: packages/**/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1
