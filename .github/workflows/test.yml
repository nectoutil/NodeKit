name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    if: |
      github.event_name != 'pull_request' ||
      (github.head_ref != 'changeset-release/main' && github.head_ref != 'chore/license-headers')
    uses: ./.github/workflows/build.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test:
    name: Run tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args: [--frozen-lockfile, --ignore-scripts]

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run tests
        run: pnpm vitest run --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Run tests with coverage
        if: github.event_name != 'merge_group'
        run: pnpm test:coverage

      - name: Fix lcov paths
        if: github.event_name != 'merge_group'
        run: |
          find packages -name lcov.info -path "*/coverage/*" | while IFS= read -r f; do
            pkg=$(dirname "$(dirname "$f")")/
            sed -i "s|^SF:|SF:${pkg}|g" "$f"
          done

      - name: Upload test results artifact
        if: ${{ !cancelled() && github.event_name != 'merge_group' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-report.junit.xml
          if-no-files-found: error
          retention-days: 1

      - name: Upload coverage artifact
        if: ${{ !cancelled() && github.event_name != 'merge_group' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: packages/**/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1
