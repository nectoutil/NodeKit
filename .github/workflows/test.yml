name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  LEFTHOOK: 0

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test:
    name: Run tests and upload coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: packages

      - name: Run tests
        run: pnpm vitest run --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && github.event_name != 'merge_group' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Fix lcov paths for Codecov flags
        run: |
          find packages -name "lcov.info" -path "*/coverage/*" | while IFS= read -r f; do
            pkg=$(dirname "$(dirname "$f")")/
            sed -i "s|^SF:|SF:${pkg}|g" "$f"
          done

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && github.event_name != 'merge_group' }}
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          find packages -name "lcov.info" -path "*/coverage/*" | while IFS= read -r f; do
            flag=$(basename "$(dirname "$(dirname "$f")")")
            ./codecov upload-coverage \
              --token "$CODECOV_TOKEN" \
              --file "$f" \
              --flag "$flag" \
              --git-service github \
              --fail-on-error
          done
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
