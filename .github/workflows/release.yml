name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
  LEFTHOOK: 0

jobs:
  build:
    name: Build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/build.yml

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.NECTO_BOT_ID }}
          private_key: ${{ secrets.NECTO_BOT_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: packages

      - name: Strip devDependencies from packages
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: await import(`${process.env.GITHUB_WORKSPACE}/scripts/clean-publish.mjs`)

      - name: Create Release PR
        id: create_release_pr
        uses: changesets/action@v1
        with:
          title: 'Automated Package Release'
          createGithubReleases: true
          commit: 'Package Versioning'
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          NPM_TOKEN: ''
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public

      - name: Enable auto-merge on release PR
        if: steps.create_release_pr.outputs.pullRequestNumber
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.generate_token.outputs.token }}
          pull-request-number: ${{ steps.create_release_pr.outputs.pullRequestNumber }}
          merge-method: squash
