name: Build

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
        description: 'Codecov token (enables bundle analysis in tsdown). Optional.'
    outputs:
      artifact-name:
        description: 'Name of the uploaded dist artifact (unique per commit SHA).'
        value: ${{ jobs.build.outputs.artifact-name }}

env:
  DEFAULT_ARTIFACT_NAME: dist-${{ github.sha }}

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ env.DEFAULT_ARTIFACT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: |
            - args: [--frozen-lockfile, --ignore-scripts]

      - name: Build packages
        run: pnpm build
        env:
          CODECOV_TOKEN: ${{ github.event_name != 'merge_group' && secrets.CODECOV_TOKEN || '' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DEFAULT_ARTIFACT_NAME }}
          overwrite: true
          retention-days: 1
          compression-level: 6
          path: packages/**/dist
          if-no-files-found: error
